<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background -->
  <rect width="120" height="120" fill="#FFFFFF" rx="12"/>

  <!-- Logo Mark: Two mirrored interlocking C-shaped arcs -->
  <path d="M 35 20 A 40 40 0 1 1 35 100" 
        fill="none" stroke="#007FFF" stroke-width="2.5" 
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 85 20 A 40 40 0 1 0 85 100" 
        fill="none" stroke="#007FFF" stroke-width="2.5" 
        stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="35" y1="60" x2="85" y2="60" 
        stroke="#007FFF" stroke-width="2.5" 
        stroke-linecap="round"/>
</svg>